name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  host-test:
    name: Linux host tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: build test fixture
        working-directory: tests
        run: |
          gcc -std=gnu11 -shared -fPIC -fvisibility=default \
            -o libtestfixture.so test_fixture.c -ldl -lpthread

      - name: build and run tests
        working-directory: tests
        run: |
          make -s && bash run_tests.sh

  avd-test:
    name: AVD API ${{ matrix.api-level }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-level: [34]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: install NDK 25
        run: |
          echo y | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;25.1.8937393"

      - name: enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: default
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: bash tests/app/ci_test.sh
