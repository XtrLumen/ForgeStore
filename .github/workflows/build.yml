name: build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: setup Android SDK & NDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          curl -sLo tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q tools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "ndk;25.1.8937393" \
            "cmake;3.22.1"
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

      - name: build debug + release
        run: |
          chmod +x gradlew
          ./gradlew zipDebug zipRelease

      - uses: actions/upload-artifact@v5
        with:
          name: debug
          path: out/*-Debug.zip

      - uses: actions/upload-artifact@v5
        with:
          name: release
          path: out/*-Release.zip

      - name: publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.zip
          generate_release_notes: true
